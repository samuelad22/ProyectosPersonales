<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Location /app>
        ProxyPass ws://localhost:8080/app
        ProxyPassReverse ws://localhost:8080/app
    </Location>

    <Directory /var/www/html/public>
        Options All
        AllowOverride All
        Require all granted
    </Directory>

</VirtualHost>
